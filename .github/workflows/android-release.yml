name: Android Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Configure Android SDK path
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Install npm dependencies
        run: npm ci

      - name: Configure Android signing
        working-directory: android
        env:
          SSH_TODOLIST_ANDROID_KEYSTORE_BASE64: ${{ secrets.SSH_TODOLIST_ANDROID_KEYSTORE_BASE64 }}
          SSH_TODOLIST_ANDROID_STORE_PASSWORD: ${{ secrets.SSH_TODOLIST_ANDROID_STORE_PASSWORD }}
          SSH_TODOLIST_ANDROID_KEY_ALIAS: ${{ secrets.SSH_TODOLIST_ANDROID_KEY_ALIAS }}
          SSH_TODOLIST_ANDROID_KEY_PASSWORD: ${{ secrets.SSH_TODOLIST_ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$SSH_TODOLIST_ANDROID_KEYSTORE_BASE64" ] || [ -z "$SSH_TODOLIST_ANDROID_STORE_PASSWORD" ] || [ -z "$SSH_TODOLIST_ANDROID_KEY_ALIAS" ] || [ -z "$SSH_TODOLIST_ANDROID_KEY_PASSWORD" ]; then
            echo "Android signing secrets are not fully configured; release APK/AAB will be unsigned."
            exit 0
          fi

          printf '%s' "$SSH_TODOLIST_ANDROID_KEYSTORE_BASE64" | openssl base64 -d -A > ssh-todolist-release.jks
          cat > signing.properties <<EOF
          SSH_TODOLIST_ANDROID_STORE_FILE=$GITHUB_WORKSPACE/android/ssh-todolist-release.jks
          SSH_TODOLIST_ANDROID_STORE_PASSWORD=$SSH_TODOLIST_ANDROID_STORE_PASSWORD
          SSH_TODOLIST_ANDROID_KEY_ALIAS=$SSH_TODOLIST_ANDROID_KEY_ALIAS
          SSH_TODOLIST_ANDROID_KEY_PASSWORD=$SSH_TODOLIST_ANDROID_KEY_PASSWORD
          EOF

      - name: Validate frontend
        run: npm run check

      - name: Run frontend tests
        run: npm test

      - name: Build debug APK
        run: npm run android:build:debug

      - name: Build release APK
        run: npm run android:build:release

      - name: Build release AAB
        run: npm run android:build:aab

      - name: Collect Android artifacts
        id: collect_android_artifacts
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk release-assets/app-debug.apk

          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk release-assets/app-release.apk
            echo "release_apk=release-assets/app-release.apk" >> "$GITHUB_OUTPUT"
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk release-assets/app-release-unsigned.apk
            echo "release_apk=release-assets/app-release-unsigned.apk" >> "$GITHUB_OUTPUT"
          fi

          cp android/app/build/outputs/bundle/release/app-release.aab release-assets/app-release.aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ssh-todolist-android-${{ github.ref_name }}
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/app-debug.apk
            ${{ steps.collect_android_artifacts.outputs.release_apk }}
            release-assets/app-release.aab
